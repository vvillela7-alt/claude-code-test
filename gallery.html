<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      font-family: 'Georgia', serif;
      color: #eee;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 2.8rem;
      font-weight: normal;
      letter-spacing: 4px;
      color: #fff;
    }

    header p {
      margin-top: 0.5rem;
      color: #888;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #gallery {
      columns: 3;
      column-gap: 12px;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 900px) { #gallery { columns: 2; } }
    @media (max-width: 500px) { #gallery { columns: 1; } }

    .photo-card {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      cursor: pointer;
      background: #1a1a1a;
    }

    .photo-card img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease, filter 0.4s ease;
      filter: brightness(0.9);
    }

    .photo-card:hover img {
      transform: scale(1.04);
      filter: brightness(1);
    }

    .photo-card .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 2rem 1rem 0.8rem;
      font-size: 0.82rem;
      color: #ccc;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .photo-card:hover .caption { opacity: 1; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #lightbox.active { display: flex; }

    #lightbox img {
      max-width: 90vw;
      max-height: 82vh;
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
      object-fit: contain;
    }

    #lightbox-caption {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 1px;
    }

    #lightbox-close {
      position: absolute;
      top: 1.2rem;
      right: 1.5rem;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      line-height: 1;
      background: none;
      border: none;
      opacity: 0.7;
    }

    #lightbox-close:hover { opacity: 1; }

    #lightbox-prev, #lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.5;
      padding: 0 1rem;
      user-select: none;
    }

    #lightbox-prev:hover, #lightbox-next:hover { opacity: 1; }
    #lightbox-prev { left: 0.5rem; }
    #lightbox-next { right: 0.5rem; }

    /* Placeholder styling */
    .placeholder-card {
      background: #1a1a1a;
      border: 2px dashed #333;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      margin-bottom: 12px;
      break-inside: avoid;
      color: #555;
      font-size: 0.85rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .placeholder-card:hover {
      border-color: #666;
      color: #888;
    }

    .placeholder-card .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      opacity: 0.4;
    }

    #add-btn {
      display: block;
      margin: 0 auto 3rem;
      padding: 0.7rem 2rem;
      background: #222;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s;
    }

    #add-btn:hover { background: #2d2d2d; color: #fff; }

    #file-input { display: none; }

    .how-to {
      text-align: center;
      color: #555;
      font-size: 0.82rem;
      padding: 0 1rem 2rem;
      letter-spacing: 1px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<header>
  <h1>Pamela Anderson</h1>
  <p>Rare &amp; Archival</p>
</header>

<div style="text-align:center; padding: 1.5rem 1rem 0.5rem;">
  <button id="add-btn">+ Add Photos</button>
  <input type="file" id="file-input" accept="image/*" multiple>
</div>

<p class="how-to">Click "Add Photos" to load images from your computer, or drag &amp; drop them into the gallery.</p>

<div id="gallery"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close">&times;</button>
  <button id="lightbox-prev">&#8249;</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
  <button id="lightbox-next">&#8250;</button>
</div>

<script>
  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  const lbCaption = document.getElementById('lightbox-caption');
  const fileInput = document.getElementById('file-input');

  let photos = []; // { src, name }
  let current = 0;

  function renderGallery() {
    gallery.innerHTML = '';
    if (photos.length === 0) {
      gallery.innerHTML = `
        <div class="placeholder-card" onclick="fileInput.click()" style="column-span:all; max-width:400px; margin: 2rem auto;">
          <div class="icon">🖼</div>
          Click here or use the button above to add your photos
        </div>`;
      return;
    }

    photos.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.innerHTML = `<img src="${p.src}" alt="${p.name}" loading="lazy">
        <div class="caption">${p.name}</div>`;
      card.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(card);
    });
  }

  function openLightbox(i) {
    current = i;
    lbImg.src = photos[i].src;
    lbCaption.textContent = photos[i].name;
    lightbox.classList.add('active');
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
  }

  function navigate(dir) {
    current = (current + dir + photos.length) % photos.length;
    lbImg.src = photos[current].src;
    lbCaption.textContent = photos[current].name;
  }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-prev').addEventListener('click', () => navigate(-1));
  document.getElementById('lightbox-next').addEventListener('click', () => navigate(1));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

  // File input
  document.getElementById('add-btn').addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', e => {
    loadFiles(e.target.files);
    fileInput.value = '';
  });

  function loadFiles(files) {
    [...files].forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        photos.push({ src: ev.target.result, name: file.name.replace(/\.[^.]+$/, '') });
        renderGallery();
      };
      reader.readAsDataURL(file);
    });
  }

  // Drag and drop
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
    if (files.length) loadFiles(files);
  });

  renderGallery();
</script>
</body>
</html>
