<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Peppa Pig Super Adventure</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a0030; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; user-select:none; }
  canvas { display:block; border-radius:10px; box-shadow:0 0 40px rgba(255,105,180,0.5); max-width:100vw; max-height:90vh; }
  #controls { display:flex; gap:30px; margin-top:10px; }
  .ctrl-group { display:flex; gap:6px; }
  .ctrl-btn { width:48px; height:48px; border-radius:50%; border:none; font-size:20px; cursor:pointer; background:rgba(255,255,255,0.15); color:#fff; active:scale(0.9); transition:transform .1s; touch-action:none; }
  .ctrl-btn:active { transform:scale(0.85); background:rgba(255,255,255,0.3); }
  #jump-btn { width:56px; height:56px; font-size:22px; background:rgba(255,100,150,0.3); }
  @media (min-width:700px) { #controls { display:none; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <div class="ctrl-group">
    <button class="ctrl-btn" id="btn-left">◀</button>
    <button class="ctrl-btn" id="btn-right">▶</button>
  </div>
  <button class="ctrl-btn" id="jump-btn">🐷</button>
</div>

<script>
'use strict';
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 800, H = 460;
canvas.width = W; canvas.height = H;

// ─── Audio ────────────────────────────────────────────
let AC;
function initAudio() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); }
function beep(freq, type, dur, vol=0.25, freqEnd) {
  if (!AC) return;
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type; o.frequency.setValueAtTime(freq,AC.currentTime);
    if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd,AC.currentTime+dur);
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start(AC.currentTime); o.stop(AC.currentTime+dur);
  } catch(e){}
}
const sfx = {
  jump:   ()=>{ beep(320,'square',.08,.2,600); },
  coin:   ()=>{ beep(880,'sine',.08,.2); beep(1100,'sine',.12,.15); },
  stomp:  ()=>{ beep(120,'square',.18,.3,60); },
  die:    ()=>{ beep(440,'sawtooth',.12,.25,220); beep(220,'sawtooth',.2,.2,110); },
  puddle: ()=>{ beep(180,'sine',.25,.2,80); },
  win:    ()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'sine',.2,.3),i*120)); },
};

// ─── Input ────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();});
document.addEventListener('keyup',  e=>{keys[e.code]=false;});
// Touch buttons
function bindBtn(id,code){
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('pointerdown',e=>{keys[code]=true;e.preventDefault();},{passive:false});
  el.addEventListener('pointerup',  e=>{keys[code]=false;},{passive:false});
  el.addEventListener('pointerleave',e=>{keys[code]=false;});
}
bindBtn('btn-left','ArrowLeft'); bindBtn('btn-right','ArrowRight'); bindBtn('jump-btn','Space');

// ─── Utilities ────────────────────────────────────────
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
function rr(x,y,w,h,r=4){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}
function overlap(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

// ─── Constants ────────────────────────────────────────
const GY = 390;  // ground top y
const LW = 8400; // level width
const GRAVITY = 0.52, MAX_FALL = 16;

// ─── Level data ───────────────────────────────────────
const platforms = [
  // Ground strips (h=70)
  {x:0,    y:GY, w:1300, h:70, g:true},
  {x:1450, y:GY, w:700,  h:70, g:true},
  {x:2300, y:GY, w:900,  h:70, g:true},
  {x:3350, y:GY, w:750,  h:70, g:true},
  {x:4200, y:GY, w:850,  h:70, g:true},
  {x:5150, y:GY, w:950,  h:70, g:true},
  {x:6200, y:GY, w:800,  h:70, g:true},
  {x:7100, y:GY, w:1300, h:70, g:true},
  // Floating (h=16)
  {x:260,  y:318, w:110, h:16},
  {x:450,  y:258, w:100, h:16},
  {x:640,  y:198, w:110, h:16},
  {x:850,  y:258, w:100, h:16},
  {x:1050, y:318, w:110, h:16},
  {x:1500, y:298, w:120, h:16},
  {x:1710, y:238, w:110, h:16},
  {x:1920, y:178, w:120, h:16},
  {x:2130, y:238, w:110, h:16},
  {x:2400, y:298, w:120, h:16},
  {x:2640, y:238, w:110, h:16},
  {x:2880, y:178, w:120, h:16},
  {x:3100, y:238, w:110, h:16},
  {x:3400, y:298, w:130, h:16},
  {x:3660, y:228, w:110, h:16},
  {x:3900, y:168, w:110, h:16},
  {x:4250, y:308, w:120, h:16},
  {x:4490, y:238, w:110, h:16},
  {x:4730, y:178, w:110, h:16},
  {x:4960, y:238, w:110, h:16},
  {x:5200, y:308, w:130, h:16},
  {x:5440, y:238, w:120, h:16},
  {x:5680, y:168, w:130, h:16},
  {x:5930, y:238, w:110, h:16},
  {x:6250, y:298, w:140, h:16},
  {x:6520, y:228, w:120, h:16},
  {x:6780, y:168, w:130, h:16},
  {x:7050, y:228, w:140, h:16},
];

// Stars
const stars=[];
platforms.filter(p=>!p.g).forEach(p=>{
  for(let x=p.x+18;x<p.x+p.w-18;x+=36) stars.push({x,y:p.y-22,c:false,t:Math.random()*6.28});
});
[180,360,540,750,950,1130,1600,1830,2000,2500,2750].forEach(x=>
  stars.push({x,y:GY-28,c:false,t:Math.random()*6.28}));

// Puddles
const puddles=[
  {x:380,y:GY,w:88,h:14,s:false},{x:720,y:GY,w:80,h:14,s:false},
  {x:1050,y:GY,w:70,h:14,s:false},{x:1550,y:GY,w:90,h:14,s:false},
  {x:2000,y:GY,w:80,h:14,s:false},{x:2500,y:GY,w:95,h:14,s:false},
  {x:3150,y:GY,w:80,h:14,s:false},{x:3600,y:GY,w:85,h:14,s:false},
  {x:4300,y:GY,w:90,h:14,s:false},{x:5200,y:GY,w:80,h:14,s:false},
  {x:5900,y:GY,w:88,h:14,s:false},{x:6600,y:GY,w:80,h:14,s:false},
];

// Enemies: {x,y,vx,w,h,alive,sx,ex,t}
const enemies=[
  {x:450,  y:GY-42, vx:1.4, w:38,h:42,alive:true,sx:350, ex:700},
  {x:750,  y:GY-42, vx:-1.4,w:38,h:42,alive:true,sx:600, ex:1000},
  {x:1150, y:GY-42, vx:1.4, w:38,h:42,alive:true,sx:1050,ex:1280},
  {x:1520, y:GY-42, vx:1.2, w:38,h:42,alive:true,sx:1460,ex:2130},
  {x:2000, y:GY-42, vx:-1.4,w:38,h:42,alive:true,sx:1800,ex:2200},
  {x:2600, y:GY-42, vx:1.4, w:38,h:42,alive:true,sx:2400,ex:2900},
  {x:3100, y:GY-42, vx:-1.4,w:38,h:42,alive:true,sx:2950,ex:3200},
  {x:3500, y:GY-42, vx:1.4, w:38,h:42,alive:true,sx:3360,ex:3800},
  {x:4300, y:GY-42, vx:-1.4,w:38,h:42,alive:true,sx:4210,ex:4600},
  {x:4800, y:GY-42, vx:1.4, w:38,h:42,alive:true,sx:4700,ex:5050},
  {x:5400, y:GY-42, vx:-1.4,w:38,h:42,alive:true,sx:5200,ex:5700},
  {x:6000, y:GY-42, vx:1.4, w:38,h:42,alive:true,sx:5900,ex:6200},
  {x:6500, y:GY-42, vx:-1.4,w:38,h:42,alive:true,sx:6250,ex:6900},
  {x:7200, y:GY-42, vx:1.4, w:38,h:42,alive:true,sx:7100,ex:7600},
  // Platform enemies
  {x:265,  y:310,   vx:-1,  w:34,h:38,alive:true,sx:262, ex:362},
  {x:1505, y:290,   vx:1,   w:34,h:38,alive:true,sx:1503,ex:1612},
  {x:2645, y:230,   vx:1,   w:34,h:38,alive:true,sx:2643,ex:2743},
  {x:5445, y:230,   vx:1,   w:34,h:38,alive:true,sx:5443,ex:5553},
];
enemies.forEach(e=>e.dir=e.vx>0?1:-1);

// Clouds
const clouds=Array.from({length:50},()=>({
  x:Math.random()*LW, y:20+Math.random()*160,
  w:70+Math.random()*120, h:35+Math.random()*40,
  spd:0.15+Math.random()*0.25
}));

// Hills bg
const hills=Array.from({length:45},(_,i)=>({
  x:i*195+Math.random()*80, r:70+Math.random()*90,
  c:i%2?'#4db84d':'#3da83d'
}));

// Goal
const goal={x:LW-300,y:GY-170,pole:GY};

// ─── Player ──────────────────────────────────────────
const P={
  x:80,y:GY-50,vx:0,vy:0,
  w:34,h:50,
  grnd:false,facing:1,frame:0,
  jpPressed:false,invincible:0
};

// ─── Game state ───────────────────────────────────────
let state='menu', score=0, lives=3, starCount=0, camX=0, tick=0;
let particles=[];
let deathTimer=0;
let stateDebounce=0; // frames before input accepted after state change

// ─── Reset ────────────────────────────────────────────
function reset(full=true){
  if(full){score=0;lives=3;starCount=0;stars.forEach(s=>s.c=false);puddles.forEach(p=>p.s=false);enemies.forEach(e=>{e.alive=true;e.x=e.sx;e.vx=Math.abs(e.vx)*e.dir;});}
  P.x=80;P.y=GY-50;P.vx=0;P.vy=0;P.grnd=false;P.invincible=0;P.frame=0;P.jpPressed=false;
  camX=0;particles=[];
}

// ─── Particles ────────────────────────────────────────
function burst(x,y,col,n,mud=false){
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n-(mud?Math.PI/2:0), spd=mud?2+Math.random()*4:1.5+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*spd*(mud?.6:1),vy:Math.sin(a)*spd-(mud?6:0),col,r:mud?3+Math.random()*4:2+Math.random()*3,life:1,d:mud?.022:.04});
  }
}

// ─── Physics update ───────────────────────────────────
function updatePlayer(){
  const left =keys['ArrowLeft'] ||keys['KeyA'];
  const right=keys['ArrowRight']||keys['KeyD'];
  const jump =keys['Space']||keys['ArrowUp']||keys['KeyW'];

  // Horizontal input
  if(left) { P.vx=Math.max(P.vx-1.1,-5.5); P.facing=-1; }
  if(right){ P.vx=Math.min(P.vx+1.1, 5.5); P.facing= 1; }
  if(!left&&!right) P.vx*=0.78;

  // Jump
  if(jump&&P.grnd&&!P.jpPressed){ P.vy=-13.5;P.jpPressed=true;sfx.jump(); }
  if(!jump) P.jpPressed=false;

  // Gravity
  P.vy=Math.min(P.vy+GRAVITY, MAX_FALL);

  // ── Move X then resolve ──
  P.x+=P.vx;
  P.x=Math.max(0,P.x);
  for(const pl of platforms){
    if(!overlap(P.x,P.y,P.w,P.h,pl.x,pl.y,pl.w,pl.h))continue;
    if(P.vx>0) P.x=pl.x-P.w;
    else       P.x=pl.x+pl.w;
    P.vx=0;
  }

  // ── Move Y then resolve ──
  P.grnd=false;
  P.y+=P.vy;
  for(const pl of platforms){
    if(!overlap(P.x,P.y,P.w,P.h,pl.x,pl.y,pl.w,pl.h))continue;
    if(P.vy>=0){ P.y=pl.y-P.h;P.grnd=true; }
    else       { P.y=pl.y+pl.h; }
    P.vy=0;
  }

  // Fall out
  if(P.y>H+80){ loseLife(); return; }

  // Stars
  stars.forEach(s=>{
    if(s.c)return;
    if(overlap(P.x+4,P.y+4,P.w-8,P.h-8,s.x-14,s.y-14,28,28)){
      s.c=true;score+=100;starCount++;sfx.coin();burst(s.x,s.y,'#FFD700',8);
    }
  });

  // Puddles
  puddles.forEach(p=>{
    if(!overlap(P.x,P.y+P.h-10,P.w,10,p.x,p.y,p.w,p.h))return;
    if(!p.s){p.s=true;score+=50;sfx.puddle();burst(P.x+P.w/2,GY,'#5d4037',14,true);setTimeout(()=>p.s=false,4000);}
  });

  // Enemies
  if(P.invincible===0){
    for(const e of enemies){
      if(!e.alive)continue;
      if(!overlap(P.x+4,P.y+4,P.w-8,P.h-8,e.x,e.y,e.w,e.h))continue;
      if(P.vy>0&&P.y+P.h<e.y+e.h*0.55){
        e.alive=false;P.vy=-10;score+=200;sfx.stomp();burst(e.x+e.w/2,e.y+10,'#ff7700',10);
      } else { loseLife(); return; }
    }
  }

  // Animation
  if(Math.abs(P.vx)>0.4) P.frame+=0.28;
  if(P.invincible>0) P.invincible--;

  // Camera
  camX=clamp(P.x-W*0.35,0,LW-W);

  // Goal
  if(P.x+P.w>goal.x&&P.x<goal.x+30&&P.y<GY){ state='win';sfx.win(); }
}

function updateEnemies(){
  enemies.forEach(e=>{
    if(!e.alive)return;
    e.x+=e.vx;
    if(e.x<e.sx||e.x+e.w>e.ex){ e.vx*=-1;e.dir*=-1; }
  });
}

function loseLife(){
  lives--;sfx.die();burst(P.x+P.w/2,P.y+P.h/2,'#ff69b4',16);
  if(lives<=0){ state='gameover';stateDebounce=60; }
  else{ reset(false);P.invincible=140;state='playing'; }
}

// ─── Drawing ──────────────────────────────────────────
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#6ec6f5');g.addColorStop(0.7,'#c8eafb');g.addColorStop(1,'#e8f7fe');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Hills parallax 0.3
  hills.forEach(h=>{
    const sx=h.x-camX*0.3;
    if(sx<-h.r*2||sx>W+h.r*2)return;
    ctx.fillStyle=h.c;ctx.beginPath();ctx.arc(sx,GY,h.r,Math.PI,0);ctx.fill();
  });

  // Clouds parallax 0.5
  clouds.forEach(c=>{
    const sx=c.x-camX*0.5;
    if(sx<-c.w||sx>W+c.w)return;
    drawCloud(sx,c.y,c.w,c.h);
  });
}

function drawCloud(x,y,w,h){
  ctx.fillStyle='rgba(255,255,255,0.92)';
  [[.5,.6,.5,.4],[.28,.5,.3,.38],[.74,.5,.26,.36]].forEach(([cx,cy,rx,ry])=>{
    ctx.beginPath();ctx.ellipse(x+w*cx,y+h*cy,w*rx,h*ry,0,0,Math.PI*2);ctx.fill();
  });
}

function drawPlatforms(){
  platforms.forEach(p=>{
    const sx=p.x-camX;
    if(sx>W+50||sx+p.w<-50)return;
    if(p.g){
      // Grass strip
      ctx.fillStyle='#5cb83c';ctx.fillRect(sx,p.y,p.w,13);
      // Grass blades
      ctx.strokeStyle='#46a02c';ctx.lineWidth=2;
      for(let gx=sx%20;gx<sx+p.w;gx+=10){ctx.beginPath();ctx.moveTo(gx,p.y);ctx.lineTo(gx-2,p.y-5);ctx.stroke();}
      // Dirt
      ctx.fillStyle='#8B5E3C';ctx.fillRect(sx,p.y+13,p.w,p.h-13);
      ctx.fillStyle='#7a5030';
      for(let dx=0;dx<p.w;dx+=42){ctx.fillRect(sx+dx,p.y+13,1,p.h-13);}
    } else {
      // Floating block
      ctx.fillStyle='#7dc45a';ctx.fillRect(sx,p.y,p.w,8);
      ctx.fillStyle='#5a9e38';ctx.fillRect(sx,p.y+8,p.w,5);
      ctx.fillStyle='#8B5E3C';
      ctx.fillRect(sx+3,p.y+10,p.w-6,p.h-10);
      // Block pattern
      ctx.fillStyle='#7a5030';
      ctx.fillRect(sx+p.w/2-1,p.y+10,2,p.h-10);
    }
  });
}

function drawPuddles(){
  puddles.forEach(p=>{
    const sx=p.x-camX;
    if(sx>W||sx+p.w<0)return;
    ctx.fillStyle=p.s?'#3e2723':'#4a9fd4';
    ctx.beginPath();ctx.ellipse(sx+p.w/2,p.y+p.h/2,p.w/2,p.h/2,0,0,Math.PI*2);ctx.fill();
    if(!p.s){
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath();ctx.ellipse(sx+p.w*0.35,p.y+p.h*0.32,p.w*.18,p.h*.24,0,0,Math.PI*2);ctx.fill();
    }
  });
}

function drawStars(){
  stars.forEach(s=>{
    if(s.c)return;
    const sx=s.x-camX;
    if(sx<-20||sx>W+20)return;
    s.t+=0.03;
    const bob=Math.sin(s.t)*4;
    drawStar5(sx,s.y+bob,11);
  });
}

function drawStar5(x,y,r){
  ctx.save();ctx.translate(x,y);ctx.rotate(tick*.04);
  ctx.fillStyle='#FFD700';ctx.strokeStyle='#e8a000';ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=i*4*Math.PI/5-Math.PI/2, ri=i%2?r*.42:r;
    i?ctx.lineTo(Math.cos(a)*ri,Math.sin(a)*ri):ctx.moveTo(Math.cos(a)*ri,Math.sin(a)*ri);
  }
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.restore();
}

function drawGoalObj(){
  const sx=goal.x-camX;
  if(sx<-200||sx>W+200)return;
  // Pole
  ctx.fillStyle='#bbb';ctx.fillRect(sx,GY-180,7,180);
  // Flag
  ctx.fillStyle='#ff69b4';
  ctx.beginPath();ctx.moveTo(sx+7,GY-180);ctx.lineTo(sx+54,GY-162);ctx.lineTo(sx+7,GY-145);ctx.closePath();ctx.fill();
  // Peppa star on flag
  ctx.save();ctx.translate(sx+32,GY-163);
  ctx.fillStyle='#fff';ctx.beginPath();
  for(let i=0;i<5;i++){const a=i*4*Math.PI/5-Math.PI/2,ri=i%2?4:9;i?ctx.lineTo(Math.cos(a)*ri,Math.sin(a)*ri):ctx.moveTo(Math.cos(a)*ri,Math.sin(a)*ri);}
  ctx.closePath();ctx.fill();ctx.restore();

  // House
  const hx=sx+80;
  ctx.fillStyle='#fff5e6';ctx.fillRect(hx,GY-130,140,130);
  ctx.fillStyle='#e8003c';
  ctx.beginPath();ctx.moveTo(hx-12,GY-130);ctx.lineTo(hx+70,GY-195);ctx.lineTo(hx+152,GY-130);ctx.closePath();ctx.fill();
  ctx.fillStyle='#8B4513';ctx.fillRect(hx+55,GY-65,30,65);
  ctx.fillStyle='#87CEEB';ctx.fillRect(hx+15,GY-110,28,26);ctx.fillRect(hx+97,GY-110,28,26);
  ctx.strokeStyle='#ccc';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(hx+15+14,GY-110);ctx.lineTo(hx+15+14,GY-110+26);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hx+97+14,GY-110);ctx.lineTo(hx+97+14,GY-110+26);ctx.stroke();
  ctx.fillStyle='#e8003c';ctx.font='bold 11px Arial';ctx.textAlign='center';
  ctx.fillText("CASA DE PEPPA",hx+70,GY-8);
}

// ─── Peppa drawing ────────────────────────────────────
function drawPeppa(){
  const px=P.x-camX, py=P.y;
  if(P.invincible>0&&Math.floor(P.invincible/6)%2===1)return;

  ctx.save();
  ctx.translate(px+P.w/2, py+P.h);
  if(P.facing===-1)ctx.scale(-1,1);

  const wf=P.frame, inAir=!P.grnd;
  const lsw=inAir?0:Math.sin(wf)*11;

  // ── Legs ──
  const legCol='#f4b8c8';
  // Left leg
  ctx.fillStyle=legCol;ctx.save();ctx.translate(-7,-12);ctx.rotate(lsw*.04);
  rr(-4,0,9,18,4);
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.ellipse(1,18,7,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Right leg
  ctx.fillStyle=legCol;ctx.save();ctx.translate(7,-12);ctx.rotate(-lsw*.04);
  rr(-4,0,9,18,4);
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.ellipse(-1,18,7,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // ── Dress ──
  ctx.fillStyle='#e8003c';
  ctx.beginPath();
  ctx.moveTo(-14,-12);
  ctx.bezierCurveTo(-17,-26,-14,-40,-7,-42);
  ctx.lineTo(7,-42); ctx.bezierCurveTo(14,-40,17,-26,14,-12);
  ctx.closePath();ctx.fill();
  // Collar
  ctx.fillStyle='#c8001a';
  ctx.beginPath();ctx.ellipse(0,-42,11,4,0,0,Math.PI*2);ctx.fill();
  // Button detail
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,-34,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(0,-26,2,0,Math.PI*2);ctx.fill();

  // ── Arms ──
  ctx.fillStyle=legCol;
  const aSwing=inAir?.8:Math.sin(wf)*.35;
  ctx.save();ctx.translate(-14,-36);ctx.rotate(-0.5-aSwing);rr(-4,0,8,14,4);ctx.restore();
  ctx.save();ctx.translate(6,-36); ctx.rotate( 0.5+aSwing);rr(-4,0,8,14,4);ctx.restore();

  // ── Head (tilted) ──
  ctx.save();ctx.translate(6,-54);ctx.rotate(-0.12);
  ctx.fillStyle='#f4a7b9';
  ctx.beginPath();ctx.ellipse(0,0,17,14,0,0,Math.PI*2);ctx.fill();
  // Cheek blush
  ctx.fillStyle='rgba(255,100,130,.22)';
  ctx.beginPath();ctx.ellipse(-4,3,6,4,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // ── Snout ── (most recognizable feature)
  ctx.fillStyle='#f4a7b9';
  ctx.beginPath();ctx.ellipse(20,-51,9.5,7,0.12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#d4849a';
  ctx.beginPath();ctx.arc(17,-50,2.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(23,-50,2.2,0,Math.PI*2);ctx.fill();

  // ── Ears ──
  ctx.fillStyle='#f4a7b9';
  ctx.beginPath();ctx.ellipse(-2,-65,6,9,-.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(12,-66,5.5,8.5,.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8899e';
  ctx.beginPath();ctx.ellipse(-2,-65,3,5.5,-.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(12,-66,2.5,5,.2,0,Math.PI*2);ctx.fill();

  // ── Eye ──
  const blink=tick%130<5;
  if(!blink){
    ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(14,-58,5.5,6.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(15,-57,3.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(16.5,-59,1.4,0,Math.PI*2);ctx.fill();
  } else {
    ctx.strokeStyle='#333';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(9,-57);ctx.lineTo(20,-57);ctx.stroke();
  }
  // Eyelashes
  ctx.strokeStyle='#555';ctx.lineWidth=1.5;
  [[9,-63,10,-60],[14,-64,14,-61],[19,-63,18,-60]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });

  // Smile
  ctx.strokeStyle='#c06070';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(17,-48,5,.15,Math.PI-.15);ctx.stroke();

  ctx.restore();
}

// ─── Wolf enemy drawing ──────────────────────────────
function drawWolf(e){
  const sx=e.x-camX;
  if(sx<-80||sx>W+80)return;
  ctx.save();
  ctx.translate(sx+e.w/2,e.y+e.h);
  ctx.scale(e.dir,1);

  // Legs
  const lf=Math.sin(tick*.22)*9;
  ctx.fillStyle='#909090';
  ctx.save();ctx.translate(-8,0);ctx.rotate(lf*.04);rr(-4,-14,8,15,3);ctx.restore();
  ctx.save();ctx.translate(4,0); ctx.rotate(-lf*.04);rr(-4,-14,8,15,3);ctx.restore();

  // Body
  ctx.fillStyle='#a0a0a8';
  ctx.beginPath();ctx.ellipse(0,-22,13,17,0,0,Math.PI*2);ctx.fill();

  // Belly
  ctx.fillStyle='#d0d0d8';
  ctx.beginPath();ctx.ellipse(0,-20,8,11,0,0,Math.PI*2);ctx.fill();

  // Tail
  ctx.strokeStyle='#909090';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-13,-15);ctx.quadraticCurveTo(-28,-22,-23,-34);ctx.stroke();

  // Arms
  ctx.fillStyle='#a0a0a8';
  ctx.save();ctx.translate(-12,-30);ctx.rotate(-.4);rr(-3,0,6,11,3);ctx.restore();
  ctx.save();ctx.translate(7,-30); ctx.rotate(.4);rr(-3,0,6,11,3);ctx.restore();

  // Head
  ctx.fillStyle='#b8b8c0';
  ctx.beginPath();ctx.ellipse(5,-40,14,12,.15,0,Math.PI*2);ctx.fill();

  // Snout
  ctx.fillStyle='#ccc';
  ctx.beginPath();ctx.ellipse(16,-38,8,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#999';
  ctx.beginPath();ctx.arc(14,-37,1.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(19,-37,1.8,0,Math.PI*2);ctx.fill();

  // Eyes (red, menacing)
  ctx.fillStyle='#cc0000';ctx.beginPath();ctx.arc(10,-44,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath();ctx.arc(11,-44,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath();ctx.arc(12,-45,0.9,0,Math.PI*2);ctx.fill();

  // Ears
  ctx.fillStyle='#909090';
  ctx.beginPath();ctx.moveTo(-2,-50);ctx.lineTo(-7,-61);ctx.lineTo(5,-53);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(10,-51);ctx.lineTo(12,-63);ctx.lineTo(18,-53);ctx.closePath();ctx.fill();
  ctx.fillStyle='#d09090';
  ctx.beginPath();ctx.moveTo(0,-51);ctx.lineTo(-4,-59);ctx.lineTo(4,-53);ctx.closePath();ctx.fill();

  // Eyebrow (angry)
  ctx.strokeStyle='#666';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(6,-49);ctx.lineTo(14,-51);ctx.stroke();

  ctx.restore();
}

// ─── HUD ─────────────────────────────────────────────
function drawHUD(){
  // Left panel
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.beginPath();rr(8,8,180,56,10);
  ctx.fill();
  drawStar5(30,28,10);
  ctx.fillStyle='#fff';ctx.font='bold 15px Arial';ctx.textAlign='left';
  ctx.fillText(`×${starCount}`,46,33);
  ctx.fillStyle='#FFD700';ctx.font='bold 13px Arial';
  ctx.fillText(`PUNTOS: ${score}`,14,56);

  // Right panel - lives
  ctx.fillStyle='rgba(0,0,0,.4)';rr(W-120,8,112,38,10);ctx.fill();
  ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='bold 22px Arial';
  let hts='';for(let i=0;i<lives;i++)hts+='♥';
  ctx.fillStyle='#ff4466';
  ctx.fillText(hts,W-10,34);

  // Level bar
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(8,H-14,W-16,6);
  ctx.fillStyle='#ff69b4';ctx.fillRect(8,H-14,(W-16)*(P.x/LW),6);
}

// ─── Particles ───────────────────────────────────────
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x-camX,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ─── Menu screen ─────────────────────────────────────
function drawMenu(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#87CEEB');g.addColorStop(1,'#c8eafb');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#5cb83c';ctx.fillRect(0,GY,W,H-GY);
  // Hills
  [[140,130],[380,170],[620,120],[760,90]].forEach(([x,r])=>{
    ctx.fillStyle='#5cb83c';ctx.beginPath();ctx.arc(x,GY,r,Math.PI,0);ctx.fill();
  });
  // Clouds
  [[60,60,160,50],[350,45,130,45],[600,70,150,50]].forEach(([x,y,w,h])=>drawCloud(x,y,w,h));

  // Title shadow
  ctx.shadowColor='rgba(200,0,80,.4)';ctx.shadowBlur=12;
  ctx.textAlign='center';
  ctx.fillStyle='#e8003c';ctx.font='bold 62px "Arial Rounded MT Bold",Arial';
  ctx.fillText('🐷 PEPPA',W/2,110);
  ctx.fillStyle='#ff69b4';ctx.font='bold 38px Arial';
  ctx.fillText('SUPER ADVENTURE',W/2,162);
  ctx.shadowBlur=0;

  // Subtitle
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.font='16px Arial';
  ctx.fillText('¡Ayuda a Peppa a llegar a casa!',W/2,200);

  // Instructions box
  ctx.fillStyle='rgba(255,255,255,.75)';rr(W/2-240,218,480,100,12);ctx.fill();
  ctx.fillStyle='#333';ctx.font='14px Arial';
  ctx.fillText('← → / A D : Mover       ESPACIO / ↑ : Saltar',W/2,242);
  ctx.fillText('Salta sobre los lobos para eliminarlos',W/2,264);
  ctx.fillText('⭐ Recoge estrellas   💧 Salta en los charcos de barro',W/2,288);
  ctx.fillText('🏠 Llega a la casa de Peppa para ganar',W/2,310);

  // Press space
  if(Math.floor(tick/28)%2===0){
    ctx.fillStyle='#e8003c';ctx.font='bold 22px Arial';
    ctx.fillText('▶  PRESIONA ESPACIO PARA JUGAR  ◀',W/2,H-55);
  }
  // Tip
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.font='13px Arial';
  ctx.fillText('Usa los botones en pantalla en móvil',W/2,H-25);
}

function drawOverlay(title,color,sub,hint){
  ctx.fillStyle='rgba(0,0,0,.68)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle=color;ctx.font='bold 60px Arial';ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=8;
  ctx.fillText(title,W/2,H/2-50);ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='26px Arial';
  ctx.fillText(sub,W/2,H/2+10);
  if(Math.floor(tick/28)%2===0){ctx.fillStyle='#ddd';ctx.font='18px Arial';ctx.fillText(hint,W/2,H/2+60);}
}

// ─── Game loop ────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,W,H);
  tick++;
  if(stateDebounce>0)stateDebounce--;

  if(state==='menu'){
    drawMenu();
    if(keys['Space']||keys['Enter']){initAudio();reset(true);state='playing';}
    requestAnimationFrame(loop);return;
  }

  // Update
  if(state==='playing'){
    updatePlayer();
    updateEnemies();
  }
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=p.d;});
  particles=particles.filter(p=>p.life>0);

  // Draw world
  drawBG();
  drawPlatforms();
  drawPuddles();
  drawGoalObj();
  drawStars();
  enemies.forEach(e=>e.alive&&drawWolf(e));
  drawPeppa();
  drawParticles();
  drawHUD();

  // Overlays
  if(state==='win'){
    drawOverlay('¡GANASTE! 🏠','#ff69b4',
      `⭐ ${starCount} estrellas  ·  Puntos: ${score}`,
      'ESPACIO para jugar de nuevo');
    if(stateDebounce===0&&(keys['Space']||keys['Enter'])){reset(true);state='playing';}
  }
  if(state==='gameover'){
    drawOverlay('GAME OVER','#ff4444',
      `Puntos: ${score}  ·  ⭐ ${starCount}`,
      'ESPACIO para intentar de nuevo');
    if(stateDebounce===0&&(keys['Space']||keys['Enter'])){reset(true);state='playing';}
  }

  requestAnimationFrame(loop);
}

loop();
</script>
